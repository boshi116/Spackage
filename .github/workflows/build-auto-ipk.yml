name: 自动识别仓库插件 编译IPK 发布Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出当前仓库代码
        uses: actions/checkout@v4
        with:
          path: plugin
          fetch-depth: 0

      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev git gawk gettext flex bison libssl-dev zlib1g-dev

      - name: 下载 OpenWrt SDK
        run: |
          git clone https://github.com/openwrt/openwrt openwrt
          cd openwrt
          ./scripts/feeds update luci packages
          ./scripts/feeds install -a

      - name: 自动添加仓库内所有 luci-app 插件
        run: |
          shopt -s nullglob
          for plugin_dir in ../plugin/luci-app-*; do
            if [ -d "$plugin_dir" ]; then
              cp -r "$plugin_dir" openwrt/package/
              echo "✅ 添加插件：$(basename $plugin_dir)"
            fi
          done

      - name: 编译所有插件
        run: |
          cd openwrt
          make defconfig
          
          shopt -s nullglob
          for plugin in package/luci-app-*; do
            name=$(basename $plugin)
            echo "🔨 正在编译：$name"
            make package/$name/compile V=s -j$(nproc)
          done

      - name: 收集所有 IPK
        run: |
          mkdir -p output
          find openwrt/bin/packages/ -name "luci-app-*.ipk" -o -name "luci-i18n-*.ipk" | xargs -I {} cp {} output/
          ls output

      - name: 发布到 Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: output/*.ipk
