name: 自动编译插件IPK并发布到Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev git gawk gettext flex bison libssl-dev

      - name: 下载 OpenWrt SDK
        run: |
          git clone https://github.com/openwrt/openwrt openwrt
          cd openwrt
          ./scripts/feeds update luci packages
          ./scripts/feeds install luci-base luci-lib-ipkg

      - name: 复制插件到 package
        run: |
          cp -r plugin/luci-app-* openwrt/package/

      - name: 编译所有插件
        run: |
          cd openwrt
          make defconfig
          for dir in package/luci-app-*; do
            name=$(basename $dir)
            make package/$name/compile V=s -j$(nproc)
          done

      - name: 强制搜索所有IPK（关键修复）
        run: |
          mkdir -p output
          find openwrt -name "*.ipk" >> all-ipk.txt
          cat all-ipk.txt
          cp $(cat all-ipk.txt) output/
          ls output

      - name: 发布到 Releases（强制上传）
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: output/*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
