name: 自动打包IPK插件
on:
  workflow_dispatch:   # 手动点击运行
  push:
    paths:
      - '.github/workflows/build-ipk.yml'
      - 'opd/**'

jobs:
  build-ipk:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 安装 OpenWrt 编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: 下载 OpenWrt SDK (x86_64 通用)
        run: |
          wget https://downloads.openwrt.org/releases/23.05.3/targets/x86/64/openwrt-sdk-23.05.3-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xJf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* sdk
          rm -f openwrt-sdk-*.tar.xz

      - name: 批量编译所有插件为 IPK
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 把 opd 目录下所有插件复制到 SDK 包目录
          mkdir -p package/community
          cp -rf ../opd/* package/community/

          # 编译所有包
          make defconfig
          make package/community/compile -j$(nproc) V=s

          # 收集所有 ipk
          mkdir -p ../ipk-packages
          find bin/packages/ -name "*.ipk" | xargs -I {} cp {} ../ipk-packages/

      - name: 上传 IPK 包 (Actions 临时文件)
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ipk-packages
          path: ipk-packages/

      - name: 发布到 GitHub Releases (永久保存)
        uses: softprops/action-gh-release@v2
        with:
          files: ipk-packages/*.ipk
          tag_name: auto-build-${{ github.sha }}
          name: 自动编译 IPK 插件包
          body: |
            自动编译时间：${{ github.event.head_commit.timestamp }}
            包含所有 opd 插件的 .ipk 安装包
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
