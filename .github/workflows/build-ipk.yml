name: 自动打包IPK插件
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-ipk.yml'
      - 'opd/**'

jobs:
  build-ipk:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: 下载并解压 OpenWrt SDK
        run: |
          wget https://downloads.openwrt.org/releases/23.05.3/targets/x86/64/openwrt-sdk-23.05.3-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          mkdir -p sdk
          tar -xJf openwrt-sdk-*.tar.xz --strip-components=1 -C sdk
          rm -f openwrt-sdk-*.tar.xz

      - name: 复制插件 + 跳过冲突包（修复递归依赖）
        run: |
          cd sdk
          mkdir -p package/community

          # 复制所有插件，但自动跳过导致报错的冲突包
          for dir in ../opd/*; do
            if [ -d "$dir" ]; then
              pkg=$(basename "$dir")
              # 跳过导致递归依赖/编译失败的插件
              if [[ "$pkg" == luci-app-ipsec-server || "$pkg" == strongswan* || "$pkg" == *ipsec* ]]; then
                echo "⏭️ 跳过冲突插件: $pkg"
                continue
              fi
              echo "✅ 添加插件: $pkg"
              cp -rf "$dir" package/community/
            fi
          done

      - name: 编译 IPK 插件
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          make defconfig
          make -j$(nproc) V=w  # 安全编译

          # 收集所有 ipk
          mkdir -p ../ipk-packages
          find bin/packages/ -name "*.ipk" | xargs -I {} cp {} ../ipk-packages/ || true

      - name: 上传 IPK 包
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ipk-packages
          path: ipk-packages/

      - name: 发布到 Releases
        uses: softprops/action-gh-release@v2
        with:
          files: ipk-packages/*.ipk
          tag_name: auto-build-${{ github.sha }}
          name: 自动编译 IPK 插件包
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
