name: 自动打包IPK插件
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-ipk.yml'
      - 'opd/**'

jobs:
  build-ipk:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 安装编译依赖 + 升级 Go 1.25
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

          # 安装 Go 1.25 解决版本报错
          wget https://go.dev/dl/go1.25.1.linux-amd64.tar.gz
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf go1.25.1.linux-amd64.tar.gz
          echo "export PATH=\$PATH:/usr/local/go/bin" | sudo tee -a /etc/profile
          source /etc/profile
          go version

      - name: 下载并解压 OpenWrt SDK
        run: |
          wget https://downloads.openwrt.org/releases/23.05.3/targets/x86/64/openwrt-sdk-23.05.3-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          mkdir -p sdk
          tar -xJf openwrt-sdk-*.tar.xz --strip-components=1 -C sdk
          rm -f openwrt-sdk-*.tar.xz

      - name: 复制插件（自动跳过所有冲突包）
        run: |
          cd sdk
          mkdir -p package/community

          # 必须跳过的冲突/失败插件列表
          BLACKLIST=(
            luci-app-ipsec-server
            strongswan
            strongswan-*
            luci-app-mosdns
            v2dat
            mosdns
            luci-app-pptpd
          )

          for dir in ../opd/*; do
            [ -d "$dir" ] || continue
            pkg=$(basename "$dir")
            
            # 跳过黑名单
            skip=0
            for bl in "${BLACKLIST[@]}"; do
              if [[ "$pkg" == $bl ]]; then
                skip=1
                break
              fi
            done
            
            if [ $skip -eq 1 ]; then
              echo "⏭️ 跳过: $pkg"
              continue
            fi

            echo "✅ 添加: $pkg"
            cp -rf "$dir" package/community/
          done

      - name: 编译所有插件为 IPK
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          make defconfig
          make package/compile -j$(nproc) V=w

          # 收集 IPK
          mkdir -p ../ipk-packages
          find bin/packages/ -name "*.ipk" | xargs -I {} cp {} ../ipk-packages/

      - name: 上传 IPK 包
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ipk-packages
          path: ipk-packages/

      - name: 发布到 Releases
        uses: softprops/action-gh-release@v2
        with:
          files: ipk-packages/*.ipk
          tag_name: auto-build-${{ github.sha }}
          name: 自动编译 IPK 插件包
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
