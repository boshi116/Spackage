concurrency:
  group: my-packages
  cancel-in-progress: true

on:
  push:
    paths:
      - '.github/workflows/merge.yml'
  schedule:
    - cron: '0 */13 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: ''

      - name: 强制清空所有残留
        run: |
          rm -rf jell_tmp tmp_jell .gitmodules .git/modules/*
          git submodule deinit --all -f 2>/dev/null || true
          git rm --cached -rf jell_tmp tmp_jell 2>/dev/null || true
          git clean -ffdx 2>/dev/null || true

      - name: 强制拉取最新代码
        run: |
          git pull --force --rebase https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main

      - name: 设置 Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          sudo timedatectl set-timezone Asia/Shanghai || true

      - name: 下载插件（不再产生临时目录）
        run: |
          set -euo pipefail
          shopt -s extglob
          rm -rf !( .github | README.md | .gitignore | .git )
          mkdir -p opd

          git_clone() {
            local repo="$1"
            local dir="$2"
            git clone --depth 1 "$repo" "opd/$dir"
          }

          {
            git_clone https://github.com/kiddin9/luci-app-dnsfilter luci-app-dnsfilter
            git_clone https://github.com/kiddin9/aria2 aria2
            git_clone https://github.com/kiddin9/autoshare autoshare
            git_clone https://github.com/kiddin9/luci-app-wizard luci-app-wizard
          } &

          {
            git_clone https://github.com/riverscn/openwrt-iptvhelper openwrt-iptvhelper
            git_clone https://github.com/kongfl888/luci-app-timedreboot luci-app-timedreboot
            git_clone https://github.com/destan19/OpenAppFilter OpenAppFilter
            git_clone https://github.com/upcliujie/luci-app-tcpdump luci-app-tcpdump
            git_clone https://github.com/Natduki/luci-app-sqm-controller luci-app-sqm-controller
            git_clone https://github.com/YusDyr/luci-app-trafficctl luci-app-trafficctl
            git_clone https://github.com/muink/luci-app-natmapt luci-app-natmapt
            git_clone https://github.com/muink/openwrt-stuntman openwrt-stuntman
            git_clone https://github.com/muink/openwrt-natmapt openwrt-natmapt
          } &

          {
            git_clone https://github.com/sirpdboy/luci-app-timecontrol luci-app-timecontrol
            git_clone https://github.com/sirpdboy/luci-app-advancedplus luci-app-advancedplus
            git_clone https://github.com/gdy666/luci-app-lucky luci-app-lucky
            git_clone https://github.com/sirpdboy/luci-app-partexp luci-app-partexp
            git_clone https://github.com/sirpdboy/netspeedtest netspeedtest
            git_clone https://github.com/sirpdboy/luci-app-watchdog luci-app-watchdog
            git_clone https://github.com/sirpdboy/luci-app-parentcontrol luci-app-parentcontrol
            git_clone https://github.com/sirpdboy/luci-app-eqosplus luci-app-eqosplus
            git_clone https://github.com/sirpdboy/luci-app-taskplan luci-app-taskplan
            git_clone https://github.com/sirpdboy/luci-app-netwizard luci-app-netwizard
          } &

          {
            git_clone https://github.com/brvphoenix/luci-app-wrtbwmon luci-app-wrtbwmon
            git_clone https://github.com/brvphoenix/wrtbwmon wrtbwmon
            git_clone https://github.com/sbwml/luci-app-mosdns luci-app-mosdns
            git_clone https://github.com/UnblockNeteaseMusic/luci-app-unblockneteasemusic luci-app-unblockneteasemusic
            git_clone https://github.com/sbwml/luci-app-quickfile luci-app-quickfile
            
            git clone --depth 1 https://github.com/gaoderby/luci-app-kms tmp_kms
            cp -r tmp_kms/luci/applications/luci-app-vlmcsd opd/
            cp -r tmp_kms/package/network/vlmcsd opd/
            rm -rf tmp_kms
            git clone --depth 1 https://github.com/openwrt/packages tmp_openwrt_pkg
            cp -r tmp_openwrt_pkg/net/adblock-fast opd/
            rm -rf tmp_openwrt_pkg
          } &

          {
            git_clone https://github.com/tty228/luci-app-wechatpush luci-app-wechatpush
            git_clone https://github.com/ZeaKyX/speedtest-web speedtest-web
            git_clone https://github.com/ZeaKyX/luci-app-speedtest-web luci-app-speedtest-web
            git_clone https://github.com/vernesong/OpenClash OpenClash
            git_clone https://github.com/gSpotx2f/luci-app-cpu-status luci-app-cpu-status
            git_clone https://github.com/ilxp/luci-app-ikoolproxy luci-app-ikoolproxy
            git_clone https://github.com/EasyTier/luci-app-easytier luci-app-easytier
            git_clone https://github.com/stackia/rtp2httpd rtp2httpd
            git_clone https://github.com/jerrykuku/luci-app-argon-config luci-app-argon-config
            git_clone https://github.com/jerrykuku/luci-theme-argon luci-theme-argon
            git_clone https://github.com/gaoyaxuan/luci-app-pushbot luci-app-pushbot
            git_clone https://github.com/nooblk-98/luci-app-netstat luci-app-netstat
            git_clone https://github.com/nooblk-98/luci-theme-noobwrt luci-theme-noobwrt
            git_clone https://github.com/muink/luci-app-tinyfilemanager luci-app-tinyfilemanager
          } &

          {
            git_clone https://github.com/kenzok78/luci-app-adguardhome luci-app-adguardhome
            git_clone https://github.com/pymumu/luci-app-smartdns luci-app-smartdns
            git_clone https://github.com/pymumu/openwrt-smartdns smartdns
            git_clone https://github.com/Openwrt-Passwall/openwrt-passwall2 openwrt-passwall2
            git_clone https://github.com/Openwrt-Passwall/openwrt-passwall openwrt-passwall
            git_clone https://github.com/timsaya/luci-app-bandix luci-app-bandix
            git_clone https://github.com/timsaya/openwrt-bandix openwrt-bandix
            git_clone https://github.com/timsaya/luci-app-bandix-plus luci-app-bandix-plus
            git_clone https://github.com/timsaya/openwrt-bandix-plus openwrt-bandix-plus
            git_clone https://github.com/huchd0/luci-app-netwiz luci-app-netwiz
            git_clone https://github.com/tpxcer/luci-app-minigate luci-app-minigate
            git_clone https://github.com/MayflyDestiny/luci-app-mosdns-panel luci-app-mosdns-panel
          } &

          {
            mkdir -p /tmp/jell
            cd /tmp/jell
            git clone --depth 1 https://github.com/kenzok8/jell .
            mv -f luci-app-aria2 luci-app-ipsec-server luci-app-pptpd webdav2 luci-app-msd_lite luci-app-onliner msd_lite unishare luci-app-unishare luci-app-rtbwmon luci-app-kodexplorer ${GITHUB_WORKSPACE}/opd/ 2>/dev/null || true
            cd ${GITHUB_WORKSPACE}
            rm -rf /tmp/jell
          } &

          wait
          find opd -name ".git*" -o -name "README*" -o -name "LICENSE" -o -name "docs" | xargs rm -rf 2>/dev/null || true
 
      - name: 提交并推送更新 + 写入 README.md
        run: |
          touch README.md
          
          git add -A 
          CHANGES=$(git status --porcelain)
          
          if [ -n "$CHANGES" ]; then
            echo "📤 检测到更新，开始提交"
            echo "====================================="
            echo "$CHANGES"
            echo "====================================="

            FILE_COUNT=$(echo "$CHANGES" | wc -l)
            UPDATE_TIME=$(date '+%Y-%m-%d %H:%M:%S')
            UPDATE_PLUGINS=$(echo "$CHANGES" | awk '{print $2}' | grep '^opd/' | cut -d'/' -f2 | sort -u | head -15)

            {
              echo "## 📦 自用包AI最近自动更新"
              echo "- 更新时间：$UPDATE_TIME"
              echo "- 更新文件数：$FILE_COUNT"
              echo "- 更新插件："
              echo "$UPDATE_PLUGINS" | while read p; do echo "  - $p"; done
              echo "---"
              echo
              cat README.md
            } > README.tmp && mv README.tmp README.md

            git add README.md
            git commit -m "📦 自动更新 $UPDATE_TIME"
            git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          else
            echo "ℹ️ 无文件变更"
            exit 0
          fi
